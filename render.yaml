services:
  # PostgreSQL Database
  - type: pserv
    name: postgres-db
    plan: free
    postgres:
      version: 13
    disk:
      name: postgres-data
      sizeGB: 1
      mountPath: /var/lib/postgresql/data

  # Backend Service (Docker)
  - type: web
    name: placement-portal-backend
    runtime: docker
    plan: free
    rootDir: .
    healthCheckPath: /
    preDeployCommand: "npx prisma migrate deploy"

    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: postgres-db
          property: connectionString

      # Load secrets from Render Secret File
      - fromSecretFile:
          name: backend-secrets
          path: .env