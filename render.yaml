services:
  # PostgreSQL Database
  - type: pserv
    name: postgres-db
    plan: free
    postgres:
      version: 13
    disk:
      name: postgres-data
      sizeGB: 1
      mountPath: /var/lib/postgresql/data

  # Backend Service (Node)
  - type: web
    name: placement-portal-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: "npm ci && npx prisma generate --schema=prisma/schema.prisma && npm run build"
    startCommand: "npm start"
    healthCheckPath: /
    preDeployCommand: "npx prisma migrate deploy --schema=prisma/schema.prisma"

    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: postgres-db
          property: connectionString

      # Load secrets from Render Secret File
      - fromSecretFile:
          name: backend-secrets
          path: .env